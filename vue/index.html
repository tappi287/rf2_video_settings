<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="./favicon.ico">
    <script type="text/javascript" src="%VITE_APP_EEL_SRC%"></script>
    <script type="module">
        // Detect Env production or development
        const FROZEN = parseInt(import.meta.env.VITE_APP_FROZEN || '0')
        if (!FROZEN) { eel._host="http://localhost:8123" }

        // Expose CloseApp
        eel.expose(closeApp)
        function closeApp () {
          return window.close()
        }

        // Avoid accidental dragging and triggering a preset import
        window.ondragstart = function() { return false; }
    </script>
    <title>rF2 Settings Widget</title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but rF2 Settings Widget doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
